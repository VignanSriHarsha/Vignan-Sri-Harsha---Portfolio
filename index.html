<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vignan Sri Harsha | Portfolio</title>
    <style>
        :root {
            --bg: #030303;
            --text-primary: #eaeaea;
            --text-secondary: #999999;
            --accent: #A85121; /* Terracotta/Rust Orange */
            --accent-glow: rgba(168, 81, 33, 0.15); 
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-stack);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Removed the problematic body flexbox that caused the disappearing act */
        }

        /* 1. Global Subtle Dot Grid Pattern (More Visible) */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            pointer-events: none;
        }

        /* 2. Fixed Ambient Brush/Glow Effects */
        .ambient-brush {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        /* Random, creative brush placements */
        .brush-position-1 { width: 45vw; height: 50vh; top: 10vh; left: -10vw; }
        .brush-position-2 { width: 55vw; height: 60vh; top: 60vh; right: -20vw; }
        .brush-position-3 { width: 40vw; height: 40vh; bottom: 5vh; left: 15vw; opacity: 0.5; } 

        /* 3. The Main Content Container (Bulletproof Centering) */
        .container {
            max-width: 900px;
            padding: 7rem 2rem;
            width: 100%;
            margin: 0 auto; /* Safely centers the content */
            box-sizing: border-box; /* Prevents padding from breaking the screen width */
            position: relative; /* Guarantees text sits strictly above the background */
            z-index: 10;
        }

        header { margin-bottom: 5rem; }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -2px;
            color: var(--accent);
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 300;
            margin-top: 0.5rem;
        }

        h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            margin-top: 5rem;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            font-weight: 500;
        }
        
        h2::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, var(--accent), transparent);
        }

        p {
            font-weight: 300;
            color: #b0b0b0;
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }
